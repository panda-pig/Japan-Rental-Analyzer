{% extends "base.html" %}
{% block title %}マイリスト分析{% endblock %}
{% block content %}
<h1 class="page-title">物件分析</h1>

<!-- URL输入框 -->
<div class="card" style="margin-bottom:24px;">
  <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
    物件詳細ページのURLを貼り付けてください。自動で解析し、エリア平均と比較します。
  </p>
  <div style="display:flex;gap:8px;">
    <input type="text" id="import-url" placeholder="https://suumo.jp/chintai/jnc_xxxxx/ または https://www.homes.co.jp/chintai/room/..." style="flex:1;">
    <button class="btn btn-primary" onclick="importAndAnalyze()">解析</button>
  </div>
  <div id="import-result" style="margin-top:12px;font-size:13px;"></div>
</div>

<!-- 指标卡 -->
<div class="metric-grid" id="my-metrics"></div>

<!-- 性价比散点(带区域基准线) -->
<div class="card">
  <h2>インポート物件 vs エリア平均 <span style="font-size:12px;font-weight:400;color:var(--text-muted);">点線=エリア平均</span></h2>
  <div id="chart-scatter" class="chart"></div>
</div>

<!-- 评分雷达 -->
<div class="card">
  <h2>スコア比較 <span style="font-size:12px;font-weight:400;color:var(--text-muted);">8次元レーダー(最大8件)</span></h2>
  <div id="chart-radar" class="chart"></div>
</div>

<!-- 区域偏离度 -->
<div class="card">
  <h2>エリア平均との偏差 <span style="font-size:12px;font-weight:400;color:var(--text-muted);">+%=高い / -%=安い</span></h2>
  <div id="chart-deviation" class="chart"></div>
</div>

<!-- 全物件比較表 -->
<div class="card" style="padding:0; overflow:hidden;">
  <h2 style="padding:24px 24px 0;">全物件比較表</h2>
  <div style="overflow-x:auto;">
    <table id="compare-table"><thead><tr></tr></thead><tbody></tbody></table>
  </div>
</div>

<!-- 状态进度 -->
<div class="card">
  <h2>進捗状況</h2>
  <div id="status-progress"></div>
</div>

<!-- 价格历史 -->
<div class="card">
  <h2>価格履歴</h2>
  <div id="chart-price-history" class="chart"></div>
</div>
{% endblock %}
{% block js %}my-list.js{% endblock %}
