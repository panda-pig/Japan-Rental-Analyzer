{% extends "base.html" %}
{% block title %}物件分析{% endblock %}
{% block content %}
<h1 class="page-title">物件分析</h1>

<!-- URL输入框 -->
<div class="card" style="margin-bottom:24px;">
  <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
    物件詳細ページのURLを貼り付けてください。自動で解析し、エリア平均と比較します。
  </p>
  <div style="display:flex;gap:8px;">
    <input type="text" id="import-url" placeholder="https://suumo.jp/chintai/jnc_xxxxx/ または https://www.homes.co.jp/chintai/room/..." style="flex:1;">
    <button class="btn btn-primary" onclick="importAndAnalyze()">解析</button>
  </div>
  <div id="import-result" style="margin-top:12px;font-size:13px;"></div>
</div>

<!-- 分析报告容器 -->
<div id="analysis-container"></div>
{% endblock %}
{% block js %}my-list.js{% endblock %}
