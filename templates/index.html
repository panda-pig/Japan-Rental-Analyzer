{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h1 class="page-title">エリアデータダッシュボード</h1>

<!-- 指标卡 -->
<div class="metric-grid" id="metrics"></div>

<!-- 东京23区平均租金 -->
<div class="card">
  <h2>東京都23区 平均賃料(1LDK)</h2>
  <div id="chart-tokyo-rent" class="chart"></div>
</div>

<!-- 横浜各区平均租金 -->
<div class="card">
  <h2>横浜市各区 平均賃料(1LDK)</h2>
  <div id="chart-yokohama-rent" class="chart"></div>
</div>

<!-- 区域宜居度雷达 -->
<div class="card">
  <h2>エリア宜居度 <span style="font-size:12px;font-weight:400;color:var(--text-muted);">安全性・便利度・環境・賃料</span></h2>
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
    <select id="region-selector-1" onchange="renderRegionRadar()"></select>
    <select id="region-selector-2" onchange="renderRegionRadar()"></select>
  </div>
  <div id="chart-region-radar" class="chart"></div>
</div>
{% endblock %}
{% block js %}dashboard.js{% endblock %}
