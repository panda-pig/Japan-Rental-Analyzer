{% extends "base.html" %}
{% block title %}設定{% endblock %}
{% block content %}
<div class="card"><h2>物件条件</h2>
<div class="filters">
  <div><label>月額上限</label><input type="number" id="p_max_cost"></div>
  <div><label>面積下限</label><input type="number" id="p_min_area"></div>
  <div><label>理想面積</label><input type="number" id="p_ideal_area"></div>
  <div><label>最低階</label><input type="number" id="p_min_floor"></div>
  <div><label>徒歩上限</label><input type="number" id="p_max_walk"></div>
  <div><label>築年数上限</label><input type="number" id="p_max_age"></div>
  <div><label>目標駅</label><input type="text" id="p_target_station"></div>
</div></div>
<div class="card"><h2>評価ウェイト(合計100推奨、自動正規化)</h2>
<div class="filters" id="weights"></div></div>
<div class="card"><h2>初期費用係数</h2>
<div class="filters">
  <div><label>仲介手数料率</label><input type="number" step="0.05" id="p_broker"></div>
  <div><label>前家賃月数</label><input type="number" id="p_prepaid"></div>
  <div><label>固定雑費</label><input type="number" id="p_misc"></div>
</div></div>
<button class="btn btn-primary" onclick="save()">保存</button>
<button class="btn btn-ghost" onclick="recalc()">保存して再計算</button>
{% endblock %}
{% block js %}settings.js{% endblock %}
