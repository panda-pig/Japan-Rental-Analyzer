{% extends "base.html" %}
{% block title %}物件一覧{% endblock %}
{% block content %}
<h1 class="page-title">物件一覧</h1>
<div class="card filters" id="filters">
  <div><label>月額上限</label><input type="number" id="f_max_cost" placeholder="140000"></div>
  <div><label>面積下限</label><input type="number" id="f_min_area" placeholder="35"></div>
  <div><label>最低階</label><select id="f_min_floor"><option value="">-</option><option value="2">2階以上</option><option value="3">3階以上</option></select></div>
  <div><label>徒歩(分)</label><select id="f_walk"><option value="">-</option><option value="5">5分以内</option><option value="10">10分以内</option><option value="15">15分以内</option></select></div>
  <div><label>築年数</label><select id="f_age"><option value="">-</option><option value="5">5年以内</option><option value="10">10年以内</option><option value="20">20年以内</option></select></div>
  <div><label>ペット</label><select id="f_pet"><option value="">-</option><option value="1">可/相談</option></select></div>
  <div><label>推薦分</label><select id="f_score"><option value="">-</option><option value="70">70以上</option><option value="80">80以上</option></select></div>
  <div><label>並び順</label><select id="f_sort">
    <option value="score_desc">推薦分高順</option><option value="price_asc">月額安順</option>
    <option value="area_desc">面積広順</option><option value="walk_asc">徒歩近順</option>
    <option value="age_asc">築浅順</option><option value="newest">新着順</option>
  </select></div>
  <div style="flex-direction:row; align-items:flex-end; gap:8px;">
    <button class="btn btn-primary" onclick="loadListings()">検索</button>
    <button class="btn btn-ghost" onclick="toggleView()">表示切替</button>
  </div>
</div>
<div id="results" class="grid" style="margin-top:20px;"></div>
{% endblock %}
{% block js %}listings.js{% endblock %}
